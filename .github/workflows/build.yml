name: Build DeepME APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0"

      - run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Download gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -L "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar

      - run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: DeepME-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Push APK to releases
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -rf releases
          mkdir -p releases
          cp app/build/outputs/apk/debug/app-debug.apk releases/DeepME-debug.apk
          git add releases/DeepME-debug.apk
          git commit -m "🤖 Автосборка APK" && git push || echo "No changes"