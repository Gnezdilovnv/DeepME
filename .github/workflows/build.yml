name: Build DeepME APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0"

      - run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Download gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -L "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
          ls -la gradle/wrapper/

      - run: chmod +x gradlew

      - name: Build APK
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1
          echo "=== APK SEARCH ==="
          find . -name "*.apk" 2>/dev/null || echo "NO APK FOUND"

      - uses: actions/upload-artifact@v4
        with:
          name: DeepME-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Push APK to repo
        run: |
          APK=$(find app/build -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            mkdir -p releases
            cp "$APK" releases/DeepME-debug.apk
            git add releases/DeepME-debug.apk
            git commit -m "Auto build APK" && git push && echo "PUSHED" || echo "No changes"
          else
            echo "NO APK FOUND - cannot push"
          fi